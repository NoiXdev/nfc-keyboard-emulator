name: Changelog

on:
  # Manual only. Releases are tag-driven: push a vX.Y.Z tag and release.yml builds
  # + attaches the bundles. Run this by hand if you want an automatic
  # conventional-commits version bump + tag instead.
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Bump version + tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Conventional Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-user-name: "noix-bot"
          git-user-email: "noreply@noix.dev"
          git-message: "chore(release): {version}"
          preset: "conventionalcommits"
          tag-prefix: "v"
          output-file: "CHANGELOG.md"
          version-file: "./package.json"
          release-count: 0
          skip-on-empty: "true"

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}

      - name: Trigger Release workflow for new tag
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --ref "${{ steps.changelog.outputs.tag }}" \
            --repo "${{ github.repository }}"
